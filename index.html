<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💕 Nhật Ký Của Mình</title>
  <!-- =====================================================
       FONT: Quicksand (tiêu đề/nút), Dancing Script (thơ)
       Tải từ Google Fonts, hỗ trợ Tiếng Việt hoàn hảo
  ===================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* =====================================================
       BIẾN MÀU SẮC - BẢNG MÀU ROSE SMOKE PASTEL
       Thay đổi tại đây để đổi toàn bộ màu theme
    ===================================================== */
    :root {
      --rose-deep:    #c9748a;   /* Hồng đậm - viền, điểm nhấn */
      --rose-mid:     #e8a4b8;   /* Hồng giữa - gradient chính */
      --rose-soft:    #f5c6d5;   /* Hồng nhạt - nền nhẹ */
      --rose-blush:   #fde8ef;   /* Hồng phấn - nền card */
      --smoke-white:  #fff8fb;   /* Trắng sữa - nền tổng */
      --glass-bg:     rgba(255, 245, 250, 0.72);  /* Kính mờ */
      --glass-border: rgba(255, 255, 255, 0.6);   /* Viền kính */
      --shadow-soft:  0 8px 32px rgba(201, 116, 138, 0.18); /* Bóng mềm */
      --shadow-card:  0 4px 16px rgba(201, 116, 138, 0.12);
      --text-dark:    #5a3a45;   /* Chữ đậm */
      --text-mid:     #8b5a6b;   /* Chữ vừa */
      --text-light:   #b8849a;   /* Chữ nhạt */
      --radius-lg:    18px;
      --radius-md:    12px;
      --radius-sm:    8px;
    }

    /* =====================================================
       RESET & GLOBAL
    ===================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fde8ef 0%, #f5e6f0 40%, #ecdcf0 100%);
      min-height: 100vh;
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* Hạt bụi lấp lánh trang trí nền */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(232, 164, 184, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201, 116, 138, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* =====================================================
       MÀN HÌNH KHÓA BẢO MẬT
    ===================================================== */
    #lock-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #f9d0de, #f0d5ec, #e8daf5);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      gap: 0;
    }
    .lock-box {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1.5px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow: var(--shadow-soft), 0 0 0 1px rgba(255,255,255,0.3) inset;
      max-width: 340px; width: 90%;
    }
    .lock-heart { font-size: 52px; margin-bottom: 12px; animation: heartbeat 1.6s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14% { transform: scale(1.18); }
      28% { transform: scale(1); }
      42% { transform: scale(1.12); }
      56% { transform: scale(1); }
    }
    .lock-title {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem; font-weight: 700;
      color: var(--rose-deep); margin-bottom: 6px;
    }
    .lock-subtitle { font-size: 0.85rem; color: var(--text-light); margin-bottom: 28px; }

    /* Các ô nhập mật mã kiểu PIN */
    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }
    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(201,116,138,0.18);
      border: 2px solid var(--rose-mid);
      transition: all 0.25s;
    }
    .pin-dot.filled { background: var(--rose-deep); transform: scale(1.15); }

    /* Bàn phím số */
    .pin-keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .pin-key {
      background: rgba(255,255,255,0.6);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 14px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.2rem; font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .pin-key:hover { background: var(--rose-blush); transform: translateY(-1px); }
    .pin-key:active { transform: scale(0.93); background: var(--rose-soft); }
    .pin-key.del { color: var(--rose-deep); font-size: 1.1rem; }
    .lock-error {
      color: #e07080; font-size: 0.82rem; min-height: 18px;
      margin-top: 6px; font-weight: 600;
    }

    /* =====================================================
       VÙNG NỘI DUNG CHÍNH (ẩn ban đầu)
    ===================================================== */
    #app { display: none; position: relative; z-index: 1; }

    /* =====================================================
       HEADER - ĐỒNG HỒ YÊU THƯƠNG
    ===================================================== */
    .love-header {
      background: linear-gradient(135deg, rgba(201,116,138,0.85), rgba(232,164,184,0.75));
      backdrop-filter: blur(16px);
      border-bottom: 1.5px solid rgba(255,255,255,0.4);
      padding: 20px 24px;
      text-align: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(201,116,138,0.2);
    }
    .love-header-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 700; color: #fff;
      text-shadow: 0 2px 8px rgba(160,70,90,0.35);
      margin-bottom: 6px;
    }
    .clock-display {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
    }
    .clock-unit {
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      padding: 6px 12px;
      min-width: 68px;
      text-align: center;
    }
    .clock-num {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 700; color: #fff;
      line-height: 1.1;
    }
    .clock-label { font-size: 0.62rem; color: rgba(255,255,255,0.8); letter-spacing: 0.05em; text-transform: uppercase; }

    /* =====================================================
       BỐ CỤC CHÍNH: 3 CỘT (desktop) / 1 CỘT (mobile)
    ===================================================== */
    .main-layout {
      display: grid;
      grid-template-columns: 320px 1fr 280px;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 100px;
    }
    @media (max-width: 960px) {
      .main-layout { grid-template-columns: 1fr; padding: 16px 14px 100px; }
    }

    /* =====================================================
       CARD GLASS - KHUôN MẪU CHUNG CHO CÁC PHẦN
    ===================================================== */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid rgba(201,116,138,0.12);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.25rem; font-weight: 700;
      color: var(--rose-deep);
    }
    .card-body { padding: 16px 20px; }

    /* =====================================================
       BỘ LỊCH THÁNG
    ===================================================== */
    .calendar-nav {
      display: flex; align-items: center; gap: 8px;
    }
    .cal-nav-btn {
      background: rgba(201,116,138,0.1);
      border: 1px solid var(--rose-soft);
      border-radius: 8px; width: 30px; height: 30px;
      cursor: pointer; font-size: 0.9rem; color: var(--rose-deep);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cal-nav-btn:hover { background: var(--rose-soft); }
    .cal-month-label { font-weight: 700; color: var(--text-dark); font-size: 0.92rem; min-width: 100px; text-align: center; }

    /* Lưới ngày trong lịch */
    .calendar-grid { padding: 12px 16px 16px; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; margin-bottom: 6px;
    }
    .cal-weekdays span {
      font-size: 0.68rem; font-weight: 700;
      color: var(--text-light); padding: 4px 0;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day {
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 10px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-dark);
      position: relative;
      cursor: default;
      transition: all 0.15s;
      min-height: 36px;
    }
    .cal-day.empty { background: transparent; }
    .cal-day.today {
      background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
      color: #fff; box-shadow: 0 3px 10px rgba(201,116,138,0.4);
    }
    .cal-day.has-entry {
      background: rgba(201,116,138,0.1);
      cursor: pointer; border: 1.5px solid rgba(201,116,138,0.25);
    }
    .cal-day.has-entry:hover { background: var(--rose-blush); transform: scale(1.08); }
    .cal-day .day-heart { font-size: 0.65rem; line-height: 1; }
    .cal-day .day-ann { /* chấm kỷ niệm */
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--rose-deep);
      margin-top: 1px;
    }

    /* =====================================================
       DÒNG THỜI GIAN NHẬT KÝ (TIMELINE)
    ===================================================== */
    .timeline-list { display: flex; flex-direction: column; gap: 12px; padding: 12px 16px 16px; }
    .timeline-item {
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(201,116,138,0.15);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .timeline-item::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--rose-mid), var(--rose-deep));
      border-radius: 3px 0 0 3px;
    }
    .timeline-item:hover { transform: translateX(4px); box-shadow: var(--shadow-card); background: rgba(255,255,255,0.8); }
    .entry-date { font-size: 0.72rem; color: var(--text-light); font-weight: 600; margin-bottom: 3px; }
    .entry-title { font-weight: 700; color: var(--text-dark); font-size: 0.92rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-preview { font-size: 0.78rem; color: var(--text-mid); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .timeline-empty { text-align: center; color: var(--text-light); font-size: 0.85rem; padding: 24px 0; }

    /* Nút đồng bộ */
    .sync-btn {
      background: none; border: 1.5px solid var(--rose-mid);
      border-radius: 20px; padding: 5px 14px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      color: var(--rose-deep); cursor: pointer;
      transition: all 0.2s;
    }
    .sync-btn:hover { background: var(--rose-blush); }
    .sync-btn.loading { opacity: 0.6; cursor: not-allowed; }

    /* =====================================================
       DANH SÁCH NGÀY KỶ NIỆM
    ===================================================== */
    .ann-list { display: flex; flex-direction: column; gap: 8px; padding: 8px 16px 16px; }
    .ann-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(201,116,138,0.15);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .ann-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--rose-deep); flex-shrink: 0; }
    .ann-info { flex: 1; min-width: 0; }
    .ann-name { font-weight: 600; font-size: 0.85rem; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ann-date-text { font-size: 0.72rem; color: var(--text-light); }
    .ann-del-btn { background: none; border: none; cursor: pointer; color: var(--rose-mid); font-size: 0.9rem; padding: 2px 4px; transition: color 0.15s; }
    .ann-del-btn:hover { color: #e05070; }

    /* Nút thêm kỷ niệm */
    .add-btn-sm {
      background: rgba(201,116,138,0.1);
      border: 1.5px dashed var(--rose-mid);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      width: 100%; cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      color: var(--rose-deep);
      transition: all 0.2s; margin: 0 16px 16px; width: calc(100% - 32px);
    }
    .add-btn-sm:hover { background: var(--rose-blush); }

    /* =====================================================
       NÚT VIẾT NHẬT KÝ (nổi góc dưới phải)
    ===================================================== */
    #fab-write {
      position: fixed; bottom: 28px; right: 24px;
      width: 58px; height: 58px; border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
      border: none; cursor: pointer; z-index: 200;
      box-shadow: 0 6px 24px rgba(201,116,138,0.5);
      font-size: 1.5rem; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #fab-write:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 10px 30px rgba(201,116,138,0.6); }

    /* =====================================================
       MODAL (Popup viết nhật ký / xem bài / thêm kỷ niệm)
    ===================================================== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(90, 40, 60, 0.35);
      backdrop-filter: blur(6px);
      z-index: 500;
      display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: linear-gradient(160deg, #fff8fb, #fde8ef);
      border: 1.5px solid var(--glass-border);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(160,70,90,0.25);
      width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      padding: 28px 28px 24px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: rgba(201,116,138,0.1); border: 1px solid var(--rose-soft);
      border-radius: 50%; width: 32px; height: 32px;
      cursor: pointer; font-size: 1rem; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--rose-blush); color: var(--rose-deep); }
    .modal-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem; font-weight: 700;
      color: var(--rose-deep); margin-bottom: 18px;
    }

    /* Form nhập liệu */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--text-mid); margin-bottom: 6px; letter-spacing: 0.04em; }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(201,116,138,0.25);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.88rem; color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--rose-deep); }
    .form-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
      border: none; border-radius: var(--radius-sm);
      padding: 12px; color: #fff;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,116,138,0.4); }
    .btn-secondary {
      background: rgba(201,116,138,0.1);
      border: 1.5px solid var(--rose-soft);
      border-radius: var(--radius-sm);
      padding: 12px 18px; color: var(--rose-deep);
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--rose-blush); }
    .btn-danger {
      background: rgba(224,80,100,0.08);
      border: 1.5px solid rgba(224,80,100,0.3);
      border-radius: var(--radius-sm);
      padding: 12px 16px; color: #e05070;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(224,80,100,0.15); }

    /* Phần xem bài nhật ký */
    .view-entry-date { font-size: 0.78rem; color: var(--text-light); font-weight: 600; margin-bottom: 4px; }
    .view-entry-content {
      background: rgba(255,255,255,0.6);
      border-radius: var(--radius-sm);
      padding: 16px; margin-top: 14px;
      font-size: 0.9rem; line-height: 1.8;
      color: var(--text-dark);
      white-space: pre-wrap;
      max-height: 45vh; overflow-y: auto;
    }
    .view-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    /* Toast thông báo */
    #toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(90,40,60,0.85);
      backdrop-filter: blur(10px);
      color: #fff; padding: 10px 22px;
      border-radius: 20px; font-size: 0.85rem; font-weight: 600;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: all 0.3s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(201,116,138,0.3);
      border-top-color: var(--rose-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar tùy chỉnh */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--rose-soft); border-radius: 5px; }
  </style>
</head>
<body>

<!-- =====================================================
     MÀN HÌNH KHÓA BẢO MẬT
     Hiển thị đầu tiên, chỉ mở khi nhập đúng mật mã
===================================================== -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-heart">💕</div>
    <div class="lock-title">Nhật ký của mình~</div>
    <p class="lock-subtitle">Nhập mật mã để mở nhé 🌸</p>
    <!-- Các chấm hiển thị số ký tự đã nhập -->
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <!-- Bàn phím số -->
    <div class="pin-keyboard">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinPress('0')" style="grid-column: 2;">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- =====================================================
     ỨNG DỤNG CHÍNH (ẩn cho đến khi mở khóa)
===================================================== -->
<div id="app">

  <!-- HEADER: ĐồNG HỒ YÊU THƯƠNG -->
  <header class="love-header">
    <div class="love-header-title">💕 Nhật Ký Của Mình 💕</div>
    <div class="clock-display">
      <div class="clock-unit">
        <div class="clock-num" id="clock-days">000</div>
        <div class="clock-label">Ngày</div>
      </div>
      <div class="clock-unit">
        <div class="clock-num" id="clock-hours">00</div>
        <div class="clock-label">Giờ</div>
      </div>
      <div class="clock-unit">

<!-- =====================================================
     JAVASCRIPT CHÍNH
     Tất cả logic ứng dụng nằm ở đây
===================================================== -->
<script>
// ===========================================================
// ⚙️ CẤU HÌNH - THAY ĐỔI TẠI ĐÂY
// ===========================================================

// 🔗 URL của Google Apps Script Web App (dán vào sau khi Deploy)
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKcrU_ElfIOIimZ0SxWjDTRhLGMx5H1X1Vl2DMdio2ZGh04B8Ty3CYtDnm_oy-Yned/exec';

// 🔑 Mật mã bảo vệ (4 chữ số)
var SECRET_PIN = '2204';

// 💕 Ngày bắt đầu tình yêu (định dạng: YYYY-MM-DD)
var LOVE_START_DATE = '2026-04-22';


// ===========================================================
// 📦 TRẠNG THÁI ỨNG DỤNG (State)
// ===========================================================
var appData = { entries: [], anniversaries: [] };  // Dữ liệu từ Drive
var calendarYear  = new Date().getFullYear();       // Năm đang xem lịch
var calendarMonth = new Date().getMonth();          // Tháng đang xem lịch (0-11)
var currentEntryId = null;                          // ID bài đang xem/sửa
var pinBuffer = '';                                 // Bộ đệm mật mã đang nhập


// ===========================================================
// 🔒 MÀN HÌNH KHÓA - XỬ LÝ PIN
// ===========================================================

/** Người dùng bấm một phím số */
function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) {
    // Đủ 4 chữ số thì kiểm tra ngay
    setTimeout(checkPin, 150);
  }
}

/** Xóa ký tự cuối */
function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('lock-error').textContent = '';
}

/** Cập nhật hiển thị các chấm tròn */
function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('dot-' + i);
    dot.classList.toggle('filled', i < pinBuffer.length);
  }
}

/** Kiểm tra mật mã */
function checkPin() {
  if (pinBuffer === SECRET_PIN) {
    // Mở khóa thành công: ẩn màn hình khóa, hiện app
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    startLoveClock();  // Bắt đầu đồng hồ đếm
    loadData();        // Tải dữ liệu từ Drive
  } else {
    document.getElementById('lock-error').textContent = 'Mật mã sai rồi iu ơi 🥺';
    pinBuffer = '';
    updatePinDots();
    // Rung màn hình khi sai (CSS animation đơn giản)
    var box = document.querySelector('.lock-box');
    box.style.animation = 'none';
    setTimeout(function() {
      box.style.animation = '';
    }, 10);
  }
}

// Cho phép bấm phím số trên bàn phím máy tính
document.addEventListener('keydown', function(e) {
  if (document.getElementById('lock-screen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinDelete();
});


// ===========================================================
// 💕 ĐỒNG HỒ YÊU THƯƠNG (REALTIME)
// ===========================================================

function startLoveClock() {
  var startDate = new Date(LOVE_START_DATE + 'T00:00:00');

  function tick() {
    var now = new Date();
    var diff = now - startDate;
    if (diff < 0) diff = 0;  // Tránh số âm nếu ngày trong tương lai

    var secs  = Math.floor(diff / 1000) % 60;
    var mins  = Math.floor(diff / 60000) % 60;
    var hours = Math.floor(diff / 3600000) % 24;
    var days  = Math.floor(diff / 86400000);

    // Thêm số 0 phía trước nếu cần (padding)
    document.getElementById('clock-days').textContent = String(days).padStart(3, '0');
    document.getElementById('clock-hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('clock-mins').textContent = String(mins).padStart(2, '0');
    document.getElementById('clock-secs').textContent = String(secs).padStart(2, '0');
  }

  tick(); // Chạy ngay lập tức
  setInterval(tick, 1000); // Cập nhật mỗi giây
}


// ===========================================================
// 🌐 TẢI DỮ LIỆU TỪ GOOGLE DRIVE (JSONP)
// Dùng thẻ <script> thay vì fetch() để tránh lỗi CORS
// ===========================================================

function loadData(callback) {
  var syncBtn = document.getElementById('sync-btn');
  if (syncBtn) syncBtn.classList.add('loading');

  // Tạo tên hàm callback duy nhất để tránh xung đột
  var callbackName = 'jsonpCallback_' + Date.now();

  // Đăng ký hàm callback toàn cục (sẽ được Apps Script gọi)
  window[callbackName] = function(data) {
    // Lưu dữ liệu vào state ứng dụng
    appData = data;
    if (!appData.entries) appData.entries = [];
    if (!appData.anniversaries) appData.anniversaries = [];

    // Cập nhật tất cả giao diện
    renderTimeline();
    renderCalendar();
    renderAnniversaries();

    if (syncBtn) syncBtn.classList.remove('loading');
    if (typeof callback === 'function') callback();

    // Dọn dẹp: xóa thẻ script và hàm callback khỏi bộ nhớ
    if (scriptTag && scriptTag.parentNode) {
      scriptTag.parentNode.removeChild(scriptTag);
    }
    delete window[callbackName];
  };

  // Tạo thẻ <script> trỏ đến Apps Script URL với tham số callback
  var scriptTag = document.createElement('script');
  var cacheBust = '&_=' + Date.now();  // Chống cache trình duyệt
  scriptTag.src = SCRIPT_URL + '?callback=' + callbackName + cacheBust;

  // Xử lý lỗi tải (URL sai, mạng yếu...)
  scriptTag.onerror = function() {
    showToast('⚠️ Không thể kết nối. Kiểm tra URL Script hoặc mạng!');
    if (syncBtn) syncBtn.classList.remove('loading');
    delete window[callbackName];
    if (scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
    // Vẫn render giao diện với dữ liệu hiện có
    renderTimeline();
    renderCalendar();
    renderAnniversaries();
  };

  document.head.appendChild(scriptTag);
}

/** Nút "Đồng bộ lại" */
function syncData() {
  showToast('⏳ Đang đồng bộ...');
  loadData(function() {
    showToast('✅ Đồng bộ thành công!');
  });
}


// ===========================================================
// 📤 GỬI DỮ LIỆU LÊN GOOGLE DRIVE (POST)
// Dùng fetch POST với định dạng text/plain để truyền JSON an toàn
// ===========================================================

function postData(payload, successMsg) {
  return fetch(SCRIPT_URL, {
    method: 'POST',
    // Gửi dạng text/plain để tránh CORS preflight (OPTIONS request)
    // Apps Script sẽ đọc qua e.postData.contents
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
    // mode: 'no-cors' nếu bạn gặp lỗi CORS nghiêm ngặt (sẽ không đọc được response)
  })
  .then(function(res) {
    // Nếu dùng no-cors, response sẽ là opaque, không đọc được
    // Nhưng dữ liệu vẫn ghi được lên Drive
    showToast(successMsg || '✅ Đã lưu!');
    loadData(); // Tải lại dữ liệu để đồng bộ giao diện
  })
  .catch(function(err) {
    // Nếu CORS block hoàn toàn, dùng no-cors thay thế
    console.warn('Thử lại với no-cors...');
    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      mode: 'no-cors'
    }).then(function() {
      showToast(successMsg || '✅ Đã lưu!');
      setTimeout(loadData, 1500); // Chờ Drive xử lý xong rồi tải lại
    }).catch(function() {
      showToast('❌ Lỗi kết nối. Thử lại sau!');
    });
  });
}


// ===========================================================
// 📖 DÒNG THỜI GIAN NHẬT KÝ (TIMELINE)
// ===========================================================

function renderTimeline() {
  var container = document.getElementById('timeline-list');
  // Lấy 5 bài gần nhất (đã sắp xếp mới nhất ở đầu từ server)
  var recent = appData.entries.slice(0, 5);

  if (recent.length === 0) {
    container.innerHTML = '<div class="timeline-empty">📝 Chưa có bài nhật ký nào~</div>';
    return;
  }

  container.innerHTML = recent.map(function(entry) {
    var preview = (entry.content || '').replace(/\n/g, ' ').substring(0, 100);
    if ((entry.content || '').length > 100) preview += '...';
    return '<div class="timeline-item" onclick="openViewModal(\'' + entry.id + '\')">' +
      '<div class="entry-date">' + formatDateVN(entry.date) + '</div>' +
      '<div class="entry-title">' + escapeHtml(entry.title || '(Không tiêu đề)') + '</div>' +
      '<div class="entry-preview">' + escapeHtml(preview) + '</div>' +
    '</div>';
  }).join('');
}


// ===========================================================
// 🗓 LỊCH THÁNG
// ===========================================================

function renderCalendar() {
  // Tiêu đề tháng
  var monthNames = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6',
                    'Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  document.getElementById('cal-month-label').textContent = monthNames[calendarMonth] + ' ' + calendarYear;

  var grid = document.getElementById('cal-days-grid');
  var today = new Date();

  // Lấy ngày đầu tiên và số ngày của tháng
  var firstDay = new Date(calendarYear, calendarMonth, 1).getDay(); // 0=CN
  var daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

  // Tạo Set các ngày đã có nhật ký (dạng YYYY-MM-DD)
  var entryDates = new Set(appData.entries.map(function(e) { return e.date; }));

  // Tạo Set các ngày kỷ niệm (dạng MM-DD để so sánh hàng năm)
  var annDates = new Set(appData.anniversaries.map(function(a) {
    return a.date ? a.date.substring(5) : ''; // Lấy MM-DD
  }));

  var html = '';

  // Ô trống đầu tháng
  for (var i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  // Các ngày trong tháng
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = calendarYear + '-' + pad2(calendarMonth + 1) + '-' + pad2(d);
    var mmdd = pad2(calendarMonth + 1) + '-' + pad2(d);
    var isToday = (d === today.getDate() && calendarMonth === today.getMonth() && calendarYear === today.getFullYear());
    var hasEntry = entryDates.has(dateStr);
    var hasAnn = annDates.has(mmdd);

    var classes = 'cal-day';
    if (isToday) classes += ' today';
    if (hasEntry) classes += ' has-entry';

    var inner = '<span>' + d + '</span>';
    if (hasEntry) inner += '<span class="day-heart">❤️</span>';
    else if (hasAnn) inner += '<span class="day-ann"></span>';

    var onClick = hasEntry ? 'openEntryByDate(\'' + dateStr + '\')' : '';
    html += '<div class="' + classes + '" ' + (onClick ? 'onclick="' + onClick + '"' : '') + '>' + inner + '</div>';
  }

  grid.innerHTML = html;
}

/** Chuyển tháng trên lịch */
function changeMonth(delta) {
  calendarMonth += delta;
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  renderCalendar();
}

/** Mở xem bài nhật ký từ ô lịch */
function openEntryByDate(dateStr) {
  var entry = appData.entries.find(function(e) { return e.date === dateStr; });
  if (entry) openViewModal(entry.id);
}


// ===========================================================
// 🌸 DANH SÁCH NGÀY KỶ NIỆM
// ===========================================================

function renderAnniversaries() {
  var container = document.getElementById('ann-list');
  if (!appData.anniversaries || appData.anniversaries.length === 0) {
    container.innerHTML = '<div class="timeline-empty">Chưa có ngày kỷ niệm nào~</div>';
    return;
  }

  container.innerHTML = appData.anniversaries.map(function(ann) {
    return '<div class="ann-item">' +
      '<div class="ann-dot"></div>' +
      '<div class="ann-info">' +
        '<div class="ann-name">' + escapeHtml(ann.name) + '</div>' +
        '<div class="ann-date-text">' + formatDateVN(ann.date) + ' (hằng năm)</div>' +
      '</div>' +
      '<button class="ann-del-btn" onclick="deleteAnniversary(\'' + ann.id + '\')" title="Xóa">🗑</button>' +
    '</div>';
  }).join('');
}

/** Mở form thêm kỷ niệm */
function openAnniversaryForm() {
  document.getElementById('ann-date').value = '';
  document.getElementById('ann-name').value = '';
  openModal('modal-anniversary');
}

/** Lưu ngày kỷ niệm mới */
function saveAnniversary() {
  var date = document.getElementById('ann-date').value;
  var name = document.getElementById('ann-name').value.trim();

  if (!date) { showToast('⚠️ Chọn ngày kỷ niệm nhé!'); return; }
  if (!name) { showToast('⚠️ Đặt tên cho ngày này nào!'); return; }

  var anniversary = {
    id: 'ann_' + Date.now(),
    date: date,
    name: name
  };

  closeModal('modal-anniversary');
  showToast('⏳ Đang lưu...');
  postData({ action: 'save_anniversary', anniversary: anniversary }, '🌸 Đã lưu ngày kỷ niệm!');
}

/** Xóa ngày kỷ niệm */
function deleteAnniversary(id) {
  if (!confirm('Xóa ngày kỷ niệm này nhé?')) return;
  showToast('⏳ Đang xóa...');
  postData({ action: 'delete_anniversary', id: id }, '🗑 Đã xóa!');
}


// ===========================================================
// ✍️ NHẬT KÝ - MỞ MODAL VIẾT MỚI / CHỈNH SỬA
// ===========================================================

/** Mở modal viết bài mới */
function openNewEntryModal() {
  currentEntryId = null;
  document.getElementById('write-modal-title').textContent = '✍️ Viết nhật ký';
  // Tự động điền ngày hôm nay
  document.getElementById('entry-date').value = todayStr();
  document.getElementById('entry-title').value = '';
  document.getElementById('entry-content').value = '';
  openModal('modal-write');
}

/** Mở modal xem bài nhật ký */
function openViewModal(id) {
  var entry = appData.entries.find(function(e) { return e.id === id; });
  if (!entry) return;
  currentEntryId = id;

  document.getElementById('view-entry-date').textContent = formatDateVN(entry.date);
  document.getElementById('view-entry-title').textContent = entry.title || '(Không tiêu đề)';
  document.getElementById('view-entry-content').textContent = entry.content || '';
  openModal('modal-view');
}

/** Mở modal chỉnh sửa bài đang xem */
function editCurrentEntry() {
  if (!currentEntryId) return;
  var entry = appData.entries.find(function(e) { return e.id === currentEntryId; });
  if (!entry) return;

  closeModal('modal-view');
  document.getElementById('write-modal-title').textContent = '✏️ Chỉnh sửa nhật ký';
  document.getElementById('entry-date').value = entry.date;
  document.getElementById('entry-title').value = entry.title || '';
  document.getElementById('entry-content').value = entry.content || '';
  openModal('modal-write');
}

/** Lưu bài nhật ký (thêm mới hoặc cập nhật) */
function saveEntry() {
  var date    = document.getElementById('entry-date').value;
  var title   = document.getElementById('entry-title').value.trim();
  var content = document.getElementById('entry-content').value.trim();

  if (!date) { showToast('⚠️ Chọn ngày viết nhé!'); return; }
  if (!content) { showToast('⚠️ Viết chút gì đó đi nào~ 🌸'); return; }

  var entry = {
    id:      currentEntryId || ('entry_' + Date.now()),
    date:    date,
    title:   title || 'Ngày ' + formatDateVN(date),
    content: content,
    updatedAt: new Date().toISOString()
  };

  closeModal('modal-write');
  showToast('⏳ Đang lưu...');
  postData({ action: 'save_entry', entry: entry }, '💾 Đã lưu nhật ký!');
}

/** Xóa bài nhật ký đang xem */
function deleteCurrentEntry() {
  if (!currentEntryId) return;
  if (!confirm('Xóa bài nhật ký này? Không khôi phục được đâu nha!')) return;
  closeModal('modal-view');
  showToast('⏳ Đang xóa...');
  postData({ action: 'delete_entry', id: currentEntryId }, '🗑 Đã xóa bài nhật ký!');
  currentEntryId = null;
}


// ===========================================================
// 🪟 ĐIỀU KHIỂN MODAL
// ===========================================================

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// Bấm vào vùng ngoài modal để đóng
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal(overlay.id);
  });
});


// ===========================================================
// 🔔 TOAST THÔNG BÁO
// ===========================================================

var toastTimer = null;
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2500);
}


// ===========================================================
// 🛠 HÀM TIỆN ÍCH
// ===========================================================

/** Thêm số 0 phía trước nếu < 10 */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

/** Trả về chuỗi ngày hôm nay dạng YYYY-MM-DD */
function todayStr() {
  var t = new Date();
  return t.getFullYear() + '-' + pad2(t.getMonth() + 1) + '-' + pad2(t.getDate());
}

/** Định dạng ngày từ YYYY-MM-DD sang "ngày DD tháng MM, YYYY" */
function formatDateVN(dateStr) {
  if (!dateStr) return '';
  var parts = dateStr.split('-');
  if (parts.length < 3) return dateStr;
  return 'ngày ' + parseInt(parts[2]) + ' tháng ' + parseInt(parts[1]) + ', ' + parts[0];
}

/** Escape HTML để tránh XSS khi hiển thị nội dung người dùng */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

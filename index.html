<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Space 🌸</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600;700&family=Itim&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink-deep: #ff6b8b;
            --pink-soft: #fca3b7;
            --pink-light: #fff0f3;
            --glass-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #4a3f41;
            --text-muted: #8a7e81;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #fcd3de 50%, #ffcbd7 100%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #loading {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 107, 139, 0.2);
            border: 1px solid var(--pink-soft);
            z-index: 100;
            font-size: 14px;
            color: var(--pink-deep);
            font-weight: 600;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(255, 107, 139, 0.1);
            padding: 30px;
        }

        .love-clock-box {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe5ec 100%);
            border: 1px solid rgba(255, 107, 139, 0.2);
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(255, 107, 139, 0.05);
        }
        .love-clock-title { font-family: 'Dancing Script', cursive; font-size: 24px; color: var(--pink-deep); margin-bottom: 5px; }
        .love-timer { font-size: 18px; font-weight: 700; color: #333; letter-spacing: 0.5px; }
        .love-timer span { color: var(--pink-deep); padding: 0 2px; }

        #lock-screen { max-width: 400px; margin: 60px auto; text-align: center; }
        .lock-logo { font-family: 'Dancing Script', cursive; font-size: 46px; color: var(--pink-deep); margin-bottom: 10px; }
        .pass-container { position: relative; margin: 25px 0; }
        .pass-input {
            width: 100%; padding: 16px; border: 1.5px solid rgba(252, 163, 183, 0.5);
            background: rgba(255, 255, 255, 0.5); border-radius: 20px; font-size: 24px;
            text-align: center; letter-spacing: 12px; outline: none; color: var(--pink-deep);
        }
        .btn-enter {
            background: linear-gradient(135deg, #ff85a2 0%, #ff6b8b 100%); color: white;
            border: none; padding: 16px 40px; border-radius: 20px; font-size: 16px;
            font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 107, 139, 0.25); transition: 0.3s;
        }

        #main-screen { display: none; }
        .main-layout {
            display: grid;
            grid-template-columns: 1.1fr 1fr 0.9fr;
            gap: 25px;
        }
        @media (max-width: 992px) { .main-layout { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }

        .section-header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-title { font-family: 'Dancing Script', cursive; font-size: 28px; color: var(--pink-deep); }
        
        .btn-sync { background: white; border: 1px solid var(--pink-soft); color: var(--pink-deep); padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-sync:hover { background: var(--pink-deep); color: white; }

        .calendar-box { background: rgba(255, 255, 255, 0.7); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); height: fit-content; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-title { font-weight: 700; font-size: 16px; }
        .nav-btn { background: white; border: 1px solid rgba(252, 163, 183, 0.2); width: 32px; height: 32px; border-radius: 10px; cursor: pointer; color: var(--pink-deep); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { font-weight: 700; color: var(--pink-deep); font-size: 11px; text-align: center; padding-bottom: 5px; }
        .cell-day {
            background: rgba(255, 255, 255, 0.8); aspect-ratio: 1; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600; color: var(--text-main); position: relative;
        }
        .cell-day.has-diary { background: linear-gradient(135deg, #fff0f3 0%, #ffe5ec 100%); color: var(--pink-deep); font-weight: 700; border: 1px solid var(--pink-soft); cursor: pointer; }
        .cell-day.has-diary:hover { transform: scale(1.05); }
        .cell-day .heart { font-size: 9px; color: #ff4757; position: absolute; bottom: 2px; }
        .cell-day .anni-dot { width: 4px; height: 4px; background-color: var(--pink-deep); border-radius: 50%; position: absolute; top: 4px; }
        .cell-day.empty { background: transparent; border: none; }

        .diary-stream, .anni-stream { max-height: 440px; overflow-y: auto; padding-right: 3px; }
        .diary-stream::-webkit-scrollbar, .anni-stream::-webkit-scrollbar { width: 3px; }
        .diary-stream::-webkit-scrollbar-thumb, .anni-stream::-webkit-scrollbar-thumb { background: var(--pink-soft); border-radius: 10px; }

        .card-diary { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.8); }
        .card-diary:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255, 107, 139, 0.08); background: linear-gradient(to right, white, var(--pink-light)); }
        .card-date { font-size: 10px; font-weight: 700; color: var(--pink-deep); background: var(--pink-light); padding: 3px 8px; border-radius: 8px; display: inline-block; margin-bottom: 5px; }
        .card-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 3px; }
        .card-preview { font-family: 'Itim', sans-serif; font-size: 13px; color: var(--text-muted); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .anni-box { background: rgba(255, 255, 255, 0.5); border-radius: 24px; padding: 18px; border: 1px solid var(--glass-border); height: fit-content; }
        .card-anni { background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 14px; margin-bottom: 10px; border-left: 4px solid var(--pink-deep); }
        .card-anni-date { font-size: 11px; font-weight: 700; color: var(--pink-deep); }
        .card-anni-name { font-size: 13px; font-weight: 600; color: #444; margin-top: 2px; }

        .btn-add-anni { width: 100%; background: white; border: 1px dashed var(--pink-deep); color: var(--pink-deep); padding: 8px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-add-anni:hover { background: var(--pink-light); }

        .btn-fab {
            position: fixed; bottom: 35px; right: calc(50% - 510px); width: 56px; height: 56px;
            background: linear-gradient(135deg, #ff85a2 0%, #ff6b8b 100%); border: none; border-radius: 18px;
            color: white; font-size: 26px; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 107, 139, 0.3);
            display: flex; align-items: center; justify-content: center; z-index: 90; transition: 0.2s;
        }
        @media (max-width: 1120px) { .btn-fab { right: 30px; } }

        #form-screen, #view-screen, #anni-form-screen { display: none; max-width: 600px; margin: 0 auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .modern-input { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(252, 163, 183, 0.3); border-radius: 16px; background: rgba(255, 255, 255, 0.7); outline: none; font-size: 14px; }
        .modern-input:focus { border-color: var(--pink-deep); background: white; }
        textarea.modern-input { height: 220px; resize: none; font-family: 'Itim', sans-serif; font-size: 17px; line-height: 1.5; }

        .flex-buttons { display: flex; gap: 12px; margin-top: 25px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 14px; font-weight: 700; font-size: 14px; border: none; cursor: pointer; text-align: center; }
        .btn-main { background: linear-gradient(135deg, #ff85a2 0%, #ff6b8b 100%); color: white; }
        .btn-back { background: #f1f5f9; color: #475569; }
        .btn-del { background: #fee2e2; color: #ef4444; }

        .paper-view { background: white; border-radius: 24px; padding: 25px; border: 1px solid var(--pink-light); }
        .view-header-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .view-header-date { font-size: 11px; text-align: center; color: var(--text-muted); margin-bottom: 20px; }
        .view-body-content { font-family: 'Itim', sans-serif; font-size: 17px; line-height: 1.6; color: #3a3a3a; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loading">✨ Đang đồng bộ không gian bí mật... ✨</div>

    <div class="love-clock-box" id="love-clock-container" style="display:none;">
        <div class="love-clock-title">Our Love Journey 💞</div>
        <div class="love-timer" id="love-timer">Đang tính toán khoảnh khắc bên nhau...</div>
    </div>

    <div id="lock-screen">
        <div class="lock-logo">Secret Space 🌸</div>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 25px;">Nơi lưu giữ những chiếc khoảnh khắc ngọt ngào</p>
        <div class="pass-container">
            <input type="password" id="password" class="pass-input" placeholder="••••" maxlength="4">
        </div>
        <button class="btn-enter" onclick="checkPassword()">Mở Sổ Kỷ Niệm 🤍</button>
    </div>

    <div id="main-screen">
        <div class="main-layout">
            <div class="calendar-box">
                <div class="calendar-nav">
                    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                    <div class="nav-title" id="calendar-month-year">Tháng --/----</div>
                    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
            <div class="timeline-box">
                <div class="section-header-box">
                    <div class="section-title">Nhật Ký Tâm Sự 📜</div>
                    <button class="btn-sync" onclick="fetchDiaries()">Đồng Bộ 🔄</button>
                </div>
                <div class="diary-stream" id="recent-list"></div>
            </div>
            <div class="anni-box">
                <div class="section-title" style="margin-bottom:12px;">Ngày Kỷ Niệm 🎀</div>
                <div class="anni-stream" id="anni-list"></div>
                <button class="btn-add-anni" onclick="showAddAnniScreen()">+ Thêm Ngày Kỷ Niệm</button>
            </div>
        </div>
        <button class="btn-fab" onclick="showCreateScreen()">+</button>
    </div>

    <div id="form-screen">
        <div class="section-title" id="form-title" style="margin-bottom:15px;">Ghi Kỷ Niệm Mới</div>
        <input type="hidden" id="diary-id">
        <div class="input-group">
            <label>📅 Ngày viết nhật ký:</label>
            <input type="date" id="diary-date" class="modern-input">
        </div>
        <div class="input-group">
            <label>🌸 Tiêu đề hôm nay:</label>
            <input type="text" id="diary-title" class="modern-input" placeholder="Hôm nay có gì vui không nè...">
        </div>
        <div class="input-group">
            <label>✍️ Tâm sự chuyện hôm nay...</label>
            <textarea id="diary-content" class="modern-input" placeholder="Kể cho cuốn sổ nghe câu chuyện của em..."></textarea>
        </div>
        <div class="flex-buttons">
            <button class="btn-action btn-back" onclick="showMainScreen()">Quay Lại</button>
            <button class="btn-action btn-main" onclick="saveDiary()" style="flex: 2;">Lưu Lại Kỷ Niệm 📝</button>
        </div>
    </div>

    <div id="anni-form-screen">
        <div class="section-title" style="margin-bottom:15px;">Thêm Ngày Kỷ Niệm Mới 🎀</div>
        <div class="input-group">
            <label>📅 Chọn Ngày:</label>
            <input type="date" id="anni-date" class="modern-input">
        </div>
        <div class="input-group">
            <label>🎈 Tên Ngày Kỷ Niệm:</label>
            <input type="text" id="anni-name" class="modern-input" placeholder="Ví dụ: Kỷ niệm ngày đầu tiên gặp nhau...">
        </div>
        <div class="flex-buttons">
            <button class="btn-action btn-back" onclick="showMainScreen()">Hủy</button>
            <button class="btn-action btn-main" onclick="saveAnni()">Lưu Ngày Đặc Biệt ✨</button>
        </div>
    </div>

    <div id="view-screen">
        <div class="section-title" style="margin-bottom:15px;">Đọc Kỷ Niệm 💕</div>
        <div class="paper-view">
            <h2 class="view-header-title" id="view-title">Tiêu đề</h2>
            <div class="view-header-date" id="view-date">Ngày --/--/----</div>
            <div class="view-body-content" id="view-content">Nội dung...</div>
        </div>
        <div class="flex-buttons">
            <button class="btn-action btn-back" onclick="showMainScreen()">Về Trang Chủ</button>
            <button class="btn-action btn-main" onclick="editCurrentDiary()" style="background: #f59e0b;">Chỉnh Sửa</button>
            <button class="btn-action btn-del" onclick="deleteCurrentDiary()">Xóa Bài</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwKcrU_ElfIOIimZ0SxWjDTRhLGMx5H1X1Vl2DMdio2ZGh04B8Ty3CYtDnm_oy-Yned/exec"; 

    let dbData = { diaries: [], anniversaries: [] };
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let selectedDiaryId = null;

    window.handleSaveResponse = function(response) {
        showLoading(false);
        if (response && response.status === "success") {
            fetchDiaries(); 
            showMainScreen();
        } else {
            alert("Lưu thất bại: " + (response.message || "Lỗi phản hồi hệ thống"));
        }
    };

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if(pass === "2204") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('love-clock-container').style.display = 'block';
            document.getElementById('main-screen').style.display = 'block';
            startLoveClock(); 
            fetchDiaries(); 
        } else {
            alert("Mật mã bí mật không đúng rồi công chúa ơi! ❌");
        }
    }

    function startLoveClock() {
        const startDate = new Date("2026-04-22T00:00:00+07:00");
        setInterval(() => {
            const now = new Date();
            const diffTime = now - startDate;
            if (diffTime < 0) {
                document.getElementById('love-timer').innerText = "Sắp đến ngày hẹn ước rồi kà! 💕";
                return;
            }
            const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffTime % (1000 * 60)) / 1000);
            document.getElementById('love-timer').innerHTML = `Đã bên nhau <span>${days}</span> Ngày <span>${hours}</span> Giờ <span>${minutes}</span> Phút <span>${seconds}</span> Giây`;
        }, 1000);
    }

    function fetchDiaries() {
        showLoading(true);
        const cacheBuster = Date.now();
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleData&_=${cacheBuster}`;
        script.onerror = function() {
            showLoading(false);
            handleData({diaries:[], anniversaries:[]});
        };
        document.body.appendChild(script);
    }

    window.handleData = function(data) {
        if (Array.isArray(data)) {
            dbData = { diaries: data, anniversaries: dbData.anniversaries || [] };
        } else if (data && typeof data === 'object') {
            dbData = {
                diaries: data.diaries || [],
                anniversaries: data.anniversaries || []
            };
        }
        renderCalendar();
        renderRecentDiaries();
        renderAnniversaries();
        showLoading(false);
        const scripts = document.querySelectorAll('script');
        scripts.forEach(s => { if(s.src.includes('callback=handleData')) s.remove(); });
    };

    // GIẢI PHÁP ĐẨY NGẦM DỮ LIỆU LỚN QUA PHƯƠNG THỨC POST KHÔNG GIỚI HẠN KÝ TỰ
    async function saveToDrive() {
        showLoading(true);
        try {
            await fetch(`${API_URL}?callback=handleSaveResponse`, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: "write", diaries: JSON.stringify(dbData) })
            });
            
            // Ép độ trễ ngắn để Google ghi đè file thành công, sau đó tự làm sạch UI
            setTimeout(() => {
                fetchDiaries();
                showMainScreen();
            }, 1500);
        } catch (error) {
            showLoading(false);
            alert("Lưu thất bại, lỗi kết nối mạng thiết bị.");
        }
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    function renderCalendar() {
        const header = document.getElementById('calendar-month-year');
        header.innerText = `Tháng ${String(currentMonth + 1).padStart(2, '0')} / ${currentYear}`;
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const dayNames = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
        dayNames.forEach(name => {
            const el = document.createElement('div');
            el.className = 'weekday'; el.innerText = name; grid.appendChild(el);
        });
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) {
            const el = document.createElement('div'); el.className = 'cell-day empty'; grid.appendChild(el);
        }
        for (let day = 1; day <= daysInMonth; day++) {
            const el = document.createElement('div'); el.className = 'cell-day'; el.innerText = day;
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const diary = dbData.diaries.find(d => d.date === dateStr);
            const isAnni = dbData.anniversaries.some(a => a.date.substring(5) === dateStr.substring(5));
            if (isAnni) {
                const dot = document.createElement('span'); dot.className = 'anni-dot'; el.appendChild(dot);
            }
            if (diary) {
                el.classList.add('has-diary');
                const heart = document.createElement('span'); heart.className = 'heart'; heart.innerText = '❤️'; el.appendChild(heart);
                el.onclick = () => viewDiary(diary.id);
            }
            grid.appendChild(el);
        }
    }

    function changeMonth(dir) {
        currentMonth += dir;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    }

    function renderRecentDiaries() {
        const list = document.getElementById('recent-list'); list.innerHTML = '';
        const sorted = [...dbData.diaries].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        if(sorted.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#baa; font-size:13px; padding: 20px 0; font-family: Itim;">Chưa có kỷ niệm nào được viết 🌸</p>';
            return;
        }
        sorted.forEach(diary => {
            const item = document.createElement('div'); item.className = 'card-diary'; item.onclick = () => viewDiary(diary.id);
            const dateParts = diary.date.split('-');
            const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            const previewText = diary.content ? diary.content.substring(0, 45) + (diary.content.length > 45 ? "..." : "") : "Chưa có nội dung tâm sự...";
            item.innerHTML = `<span class="card-date">💞 ${formattedDate}</span><div class="card-title">${diary.title || "Không có tiêu đề"}</div><div class="card-preview">${previewText}</div>`;
            list.appendChild(item);
        });
    }

    function renderAnniversaries() {
        const list = document.getElementById('anni-list'); list.innerHTML = '';
        if(!dbData.anniversaries || dbData.anniversaries.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#baa; font-size:12px; padding: 15px 0; font-family: Itim;">Chưa có ngày kỷ niệm nào được lưu 🎀</p>';
            return;
        }
        const sortedAnni = [...dbData.anniversaries].sort((a,b) => new Date(a.date) - new Date(b.date));
        sortedAnni.forEach(anni => {
            const item = document.createElement('div'); item.className = 'card-anni';
            const dParts = anni.date.split('-');
            item.innerHTML = `<div class="card-anni-date">🎉 Ngày ${dParts[2]}/${dParts[1]}</div><div class="card-anni-name">${anni.name}</div>`;
            list.appendChild(item);
        });
    }

    function showMainScreen() {
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('anni-form-screen').style.display = 'none';
        document.getElementById('view-screen').style.display = 'none';
    }

    function showCreateScreen() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        document.getElementById('form-title').innerText = "Ghi Nhật Ký Mới 📝";
        document.getElementById('diary-id').value = "";
        document.getElementById('diary-title').value = "";
        document.getElementById('diary-content').value = "";
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        document.getElementById('diary-date').value = (new Date(now - offset)).toISOString().slice(0, 10);
    }

    function showAddAnniScreen() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('anni-form-screen').style.display = 'block';
        document.getElementById('anni-date').value = "";
        document.getElementById('anni-name').value = "";
    }

    function saveAnni() {
        const date = document.getElementById('anni-date').value;
        const name = document.getElementById('anni-name').value.trim();
        if(!date || !name) { alert("Hãy điền đầy đủ ngày tháng và tên kỷ niệm nhé! 💞"); return; }
        if(!dbData.anniversaries) { dbData.anniversaries = []; }
        dbData.anniversaries.push({ id: 'anni_' + Date.now(), date: date, name: name });
        saveToDrive();
    }

    function viewDiary(id) {
        const diary = dbData.diaries.find(d => d.id === id);
        if (!diary) return;
        selectedDiaryId = id;
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('view-screen').style.display = 'block';
        document.getElementById('view-title').innerText = diary.title || "Không có tiêu đề";
        const dateParts = diary.date.split('-');
        document.getElementById('view-date').innerText = `Ngày ${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
        document.getElementById('view-content').innerText = diary.content;
    }

    function editCurrentDiary() {
        const diary = dbData.diaries.find(d => d.id === selectedDiaryId);
        if (!diary) return;
        document.getElementById('view-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        document.getElementById('form-title').innerText = "Chỉnh Sửa Kỷ Niệm ✏️";
        document.getElementById('diary-id').value = diary.id;
        document.getElementById('diary-date').value = diary.date;
        document.getElementById('diary-title').value = diary.title;
        document.getElementById('diary-content').value = diary.content;
    }

    function saveDiary() {
        const id = document.getElementById('diary-id').value;
        const date = document.getElementById('diary-date').value;
        const title = document.getElementById('diary-title').value.trim();
        const content = document.getElementById('diary-content').value.trim();
        if (!date || !content) { alert("Đừng bỏ trống nội dung tâm sự nhé! 💕"); return; }
        if(!id && dbData.diaries.some(d => d.date === date)) { alert("Ngày này hai đứa mình đã viết nhật ký rồi, hãy bấm vào bài ở danh sách Timeline để sửa nha!"); return; }
        if (id) {
            const diary = dbData.diaries.find(d => d.id === id);
            if (diary) { diary.date = date; diary.title = title; diary.content = content; }
        } else {
            dbData.diaries.push({ id: 'id_' + Date.now(), date: date, title: title, content: content });
        }
        saveToDrive();
    }

    function deleteCurrentDiary() {
        if (confirm("Em có chắc chắn muốn xóa đi trang kỷ niệm này không? 🥺")) {
            dbData.diaries = dbData.diaries.filter(d => d.id !== selectedDiaryId);
            saveToDrive();
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Diary 🌸</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600;700&family=Itim&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink-deep: #ff6b8b;
            --pink-soft: #fca3b7;
            --pink-light: #fff0f3;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #4a3f41;
            --text-muted: #8a7e81;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #fcd3de 50%, #ffcbd7 100%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Hiệu ứng loading tinh tế */
        #loading {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 107, 139, 0.15);
            border: 1px solid var(--pink-soft);
            z-index: 100;
            font-size: 14px;
            color: var(--pink-deep);
            font-weight: 600;
        }

        /* KHUNG CHỨA GIAO DIỆN KÍNH MỜ (GLASSMORPHISM) */
        .app-container {
            width: 100%;
            max-width: 960px; /* Mở rộng không gian hiển thị */
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(255, 107, 139, 0.1);
            padding: 35px;
            transition: all 0.5s ease;
        }

        /* MÀN HÌNH KHÓA SANG TRỌNG */
        #lock-screen {
            max-width: 400px;
            margin: 60px auto;
            text-align: center;
        }
        .lock-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 42px;
            color: var(--pink-deep);
            margin-bottom: 10px;
        }
        .pass-container {
            position: relative;
            margin: 25px 0;
        }
        .pass-input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid rgba(252, 163, 183, 0.5);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 12px;
            outline: none;
            color: var(--pink-deep);
            transition: 0.3s;
        }
        .pass-input:focus {
            border-color: var(--pink-deep);
            background: white;
            box-shadow: 0 0 15px rgba(255, 107, 139, 0.15);
        }
        .btn-enter {
            background: linear-gradient(135deg, #ff85a2 0%, #ff6b8b 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 107, 139, 0.25);
            transition: 0.3s;
        }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(255, 107, 139, 0.35); }

        /* MÀN HÌNH CHÍNH BỐ CỤC 2 CỘT HIỆN ĐẠI */
        #main-screen { display: none; }
        .main-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* Chia 2 cột cân đối */
            gap: 35px;
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; gap: 25px; }
        }

        .section-title {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            color: var(--pink-deep);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* THIẾT KẾ BỘ LỊCH */
        .calendar-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
        }
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .nav-title { font-weight: 700; font-size: 18px; color: var(--text-main); }
        .nav-btn {
            background: white;
            border: 1px solid rgba(252, 163, 183, 0.3);
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pink-deep);
            font-weight: bold;
            transition: 0.2s;
        }
        .nav-btn:hover { background: var(--pink-deep); color: white; border-color: var(--pink-deep); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .weekday { font-weight: 700; color: var(--pink-deep); font-size: 12px; text-align: center; padding-bottom: 5px; }
        .cell-day {
            background: rgba(255, 255, 255, 0.7);
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            border: 1px solid transparent;
        }
        .cell-day:hover:not(.empty) {
            background: white;
            transform: scale(1.08);
            border-color: var(--pink-soft);
        }
        .cell-day.has-diary {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe5ec 100%);
            color: var(--pink-deep);
            font-weight: 700;
            border: 1px solid var(--pink-soft);
        }
        .cell-day .heart {
            font-size: 10px;
            color: #ff4757;
            position: absolute;
            bottom: 4px;
        }
        .cell-day.empty { background: transparent; cursor: default; }

        /* THIẾT KẾ CỘT DANH SÁCH 5 NGÀY GẦN NHẤT */
        .timeline-box { display: flex; flex-direction: column; }
        .diary-stream { max-height: 420px; overflow-y: auto; padding-right: 5px; }
        /* Tùy chỉnh thanh cuộn cho tinh tế */
        .diary-stream::-webkit-scrollbar { width: 4px; }
        .diary-stream::-webkit-scrollbar-thumb { background: var(--pink-soft); border-radius: 10px; }

        .card-diary {
            background: white;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
        }
        .card-diary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 139, 0.1);
            background: linear-gradient(to right, white, var(--pink-light));
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .card-date {
            font-size: 11px;
            font-weight: 700;
            color: var(--pink-deep);
            background: var(--pink-light);
            padding: 4px 10px;
            border-radius: 10px;
        }
        .card-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 4px; }
        .card-preview { font-family: 'Itim', sans-serif; font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        /* NÚT THÊM MỚI NỔI BẬT KHÔNG BỊ QUÊ */
        .btn-fab {
            position: fixed;
            bottom: 40px;
            right: calc(50% - 440px);
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #ff85a2 0%, #ff6b8b 100%);
            border: none;
            border-radius: 18px; /* Đổi bo tròn tròn hẳn sang vuông bo góc hiện đại hơn */
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 107, 139, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 90;
        }
        @media (max-width: 980px) { .btn-fab { right: 30px; } }
        .btn-fab:hover { transform: scale(1.05) rotate(90deg); }

        /* MÀN HÌNH FORM VIẾT / XEM NHẬT KÝ */
        #form-screen, #view-screen { display: none; max-width: 650px; margin: 0 auto; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        
        .modern-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid rgba(252, 163, 183, 0.3);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.7);
            outline: none;
            font-size: 14px;
            color: var(--text-main);
            transition: 0.2s;
        }
        .modern-input:focus { border-color: var(--pink-deep); background: white; }
        
        textarea.modern-input {
            height: 250px;
            resize: none;
            font-family: 'Itim', sans-serif;
            font-size: 17px;
            line-height: 1.6;
        }

        .flex-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .btn-action {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn-main { background: linear-gradient(135deg, #ff85a2 0%, #ff6b8b 100%); color: white; box-shadow: 0 5px 15px rgba(255,107,139,0.2); }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(255,107,139,0.3); }
        .btn-back { background: #f1f5f9; color: #475569; }
        .btn-back:hover { background: #e2e8f0; }
        .btn-del { background: #fee2e2; color: #ef4444; }
        .btn-del:hover { background: #fca5a5; }

        /* MÀN HÌNH CHI TIẾT TÂM SỰ */
        .paper-view {
            background: white;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--pink-light);
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            position: relative;
        }
        .paper-view::before {
            content: '';
            position: absolute;
            left: 25px; top: 0; bottom: 0; width: 1px;
            background: rgba(255, 107, 139, 0.15);
        }
        .view-header-title { font-size: 22px; font-weight: 700; color: #222; text-align: center; margin-bottom: 5px; }
        .view-header-date { font-size: 12px; text-align: center; color: var(--text-muted); margin-bottom: 25px; font-weight: 600; }
        .view-body-content {
            font-family: 'Itim', sans-serif;
            font-size: 18px;
            line-height: 1.7;
            color: #3a3a3a;
            white-space: pre-wrap;
            padding-left: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loading">✨ Đang đồng bộ dữ liệu... ✨</div>

    <div id="lock-screen">
        <div class="lock-logo">Secret Diary 🌸</div>
        <p style="font-size: 13px; color: var(--text-muted);">Nơi lưu giữ những chiếc khoảnh khắc ngọt ngào</p>
        <div class="pass-container">
            <input type="password" id="password" class="pass-input" placeholder="••••" maxlength="4">
        </div>
        <button class="btn-enter" onclick="checkPassword()">Mở Sổ Kỷ Niệm 🤍</button>
    </div>

    <div id="main-screen">
        <div class="main-layout">
            
            <div class="calendar-box">
                <div class="calendar-nav">
                    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                    <div class="nav-title" id="calendar-month-year">Tháng --/----</div>
                    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <div class="timeline-box">
                <div class="section-title">Timeline Kỷ Niệm ✨</div>
                <div class="diary-stream" id="recent-list"></div>
            </div>

        </div>
        <button class="btn-fab" onclick="showCreateScreen()">+</button>
    </div>

    <div id="form-screen">
        <div class="section-title" id="form-title">Ghi Kỷ Niệm Mới</div>
        <input type="hidden" id="diary-id">
        
        <div class="input-group">
            <label>📅 Ngày viết nhật ký:</label>
            <input type="date" id="diary-date" class="modern-input">
        </div>
        <div class="input-group">
            <label>🌸 Tiêu đề hôm nay là gì nè:</label>
            <input type="text" id="diary-title" class="modern-input" placeholder="Một ngày thật tuyệt vời cùng anh...">
        </div>
        <div class="input-group">
            <label>✍️ Tâm sự chuyện hôm nay...</label>
            <textarea id="diary-content" class="modern-input" placeholder="Kể cho cuốn sổ nghe những điều ngọt ngào hôm nay của em đi..."></textarea>
        </div>
        
        <div class="flex-buttons">
            <button class="btn-action btn-back" onclick="showMainScreen()">Quay Lại</button>
            <button class="btn-action btn-main" onclick="saveDiary()" style="flex: 2;">Lưu Lại Kỷ Niệm 📝</button>
        </div>
    </div>

    <div id="view-screen">
        <div class="section-title">Đọc Kỷ Niệm 💕</div>
        <div class="paper-view">
            <h2 class="view-header-title" id="view-title">Tiêu đề</h2>
            <div class="view-header-date" id="view-date">Ngày --/--/----</div>
            <div class="view-body-content" id="view-content">Nội dung...</div>
        </div>
        
        <div class="flex-buttons">
            <button class="btn-action btn-back" onclick="showMainScreen()">Về Trang Chủ</button>
            <button class="btn-action btn-main" onclick="editCurrentDiary()" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">Chỉnh Sửa</button>
            <button class="btn-action btn-del" onclick="deleteCurrentDiary()">Xóa Bài</button>
        </div>
    </div>
</div>

<script>
    // Link API Google Apps Script chính thức của bạn
    const API_URL = "https://script.google.com/macros/s/AKfycbwKcrU_ElfIOIimZ0SxWjDTRhLGMx5H1X1Vl2DMdio2ZGh04B8Ty3CYtDnm_oy-Yned/exec"; 

    let diaries = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let selectedDiaryId = null;

    // Lắng nghe sự kiện nhấn Enter ở màn hình mật khẩu
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if(pass === "2204") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            fetchDiaries(); 
        } else {
            alert("Mật mã bí mật không đúng rồi công chúa ơi! ❌");
        }
    }

    // Đồng bộ dữ liệu từ Google Drive về máy
    async function fetchDiaries() {
        showLoading(true);
        try {
            const response = await fetch(API_URL, {
                method: 'GET',
                redirect: 'follow' 
            });
            diaries = await response.json();
            renderCalendar();
            renderRecentDiaries();
        } catch (error) {
            console.error(error);
            alert("Lỗi đồng bộ dữ liệu. Hãy đảm bảo bạn đã cấu hình 'Anyone' trên Apps Script.");
        }
        showLoading(false);
    }

    // Đẩy dữ liệu đồng bộ lên Google Drive
    async function saveToDrive() {
        showLoading(true);
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "write", diaries: diaries })
            });
            
            // Chờ 1.2 giây để Google xử lý file trước khi nạp lại giao diện mới
            setTimeout(() => {
                renderCalendar();
                renderRecentDiaries();
                showMainScreen();
                showLoading(false);
            }, 1200);
        } catch (error) {
            showLoading(false);
            alert("Đồng bộ thất bại, vui lòng thử lại.");
        }
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    // Dựng bộ lịch tháng thông minh
    function renderCalendar() {
        const header = document.getElementById('calendar-month-year');
        header.innerText = `Tháng ${String(currentMonth + 1).padStart(2, '0')} / ${currentYear}`;

        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';

        const dayNames = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
        dayNames.forEach(name => {
            const el = document.createElement('div');
            el.className = 'weekday';
            el.innerText = name;
            grid.appendChild(el);
        });

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const el = document.createElement('div');
            el.className = 'cell-day empty';
            grid.appendChild(el);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const el = document.createElement('div');
            el.className = 'cell-day';
            el.innerText = day;

            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const diary = diaries.find(d => d.date === dateStr);

            if (diary) {
                el.classList.add('has-diary');
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.innerText = '❤️';
                el.appendChild(heart);
                el.onclick = () => viewDiary(diary.id);
            } else {
                // UX nâng cấp: Bấm ngày nào trống trên lịch tự động mở viết bù đúng ngày đó
                el.onclick = () => showCreateScreen(dateStr);
            }
            grid.appendChild(el);
        }
    }

    function changeMonth(dir) {
        currentMonth += dir;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    }

    // Dựng danh sách kỷ niệm bên cột phải kèm trích dẫn ngắn (Preview)
    function renderRecentDiaries() {
        const list = document.getElementById('recent-list');
        list.innerHTML = '';
        
        const sorted = [...diaries].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        
        if(sorted.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#baa; font-size:13px; padding: 30px 0; font-family: Itim;">Chưa có kỷ niệm nào được lưu giữ 🌸</p>';
            return;
        }

        sorted.forEach(diary => {
            const item = document.createElement('div');
            item.className = 'card-diary';
            item.onclick = () => viewDiary(diary.id);

            const dateParts = diary.date.split('-');
            const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            const previewText = diary.content ? diary.content.substring(0, 50) + (diary.content.length > 50 ? "..." : "") : "Chưa có nội dung tâm sự...";

            item.innerHTML = `
                <div class="card-meta">
                    <span class="card-date">💞 ${formattedDate}</span>
                </div>
                <div class="card-title">${diary.title || "Không có tiêu đề"}</div>
                <div class="card-preview">${previewText}</div>
            `;
            list.appendChild(item);
        });
    }

    function showMainScreen() {
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('view-screen').style.display = 'none';
    }

    function showCreateScreen(specificDate = null) {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        document.getElementById('view-screen').style.display = 'none';
        
        document.getElementById('form-title').innerText = "Ghi Kỷ Niệm Mới 📝";
        document.getElementById('diary-id').value = "";
        document.getElementById('diary-title').value = "";
        document.getElementById('diary-content').value = "";
        
        if (specificDate) {
            document.getElementById('diary-date').value = specificDate;
        } else {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - offset)).toISOString().slice(0, 10);
            document.getElementById('diary-date').value = localISOTime;
        }
    }

    function viewDiary(id) {
        const diary = diaries.find(d => d.id === id);
        if (!diary) return;
        selectedDiaryId = id;

        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('view-screen').style.display = 'block';

        document.getElementById('view-title').innerText = diary.title || "Không có tiêu đề";
        const dateParts = diary.date.split('-');
        document.getElementById('view-date').innerText = `Ngày ${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
        document.getElementById('view-content').innerText = diary.content;
    }

    function editCurrentDiary() {
        const diary = diaries.find(d => d.id === selectedDiaryId);
        if (!diary) return;

        document.getElementById('view-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';

        document.getElementById('form-title').innerText = "Chỉnh Sửa Kỷ Niệm ✏️";
        document.getElementById('diary-id').value = diary.id;
        document.getElementById('diary-date').value = diary.date;
        document.getElementById('diary-title').value = diary.title;
        document.getElementById('diary-content').value = diary.content;
    }

    function saveDiary() {
        const id = document.getElementById('diary-id').value;
        const date = document.getElementById('diary-date').value;
        const title = document.getElementById('diary-title').value.trim();
        const content = document.getElementById('diary-content').value.trim();

        if (!date || !content) {
            alert("Đừng bỏ trống ngày viết hoặc nội dung tâm sự nhé! 💕");
            return;
        }

        if(!id && diaries.some(d => d.date === date)) {
            alert("Ngày này hai đứa mình đã viết nhật ký rồi nè, hãy nhấn trực tiếp vào trái tim đỏ trên lịch để sửa nha!");
            return;
        }

        if (id) {
            const diary = diaries.find(d => d.id === id);
            if (diary) {
                diary.date = date;
                diary.title = title;
                diary.content = content;
            }
        } else {
            const newDiary = {
                id: 'id_' + Date.now(),
                date: date,
                title: title,
                content: content
            };
            diaries.push(newDiary);
        }

        saveToDrive();
    }

    function deleteCurrentDiary() {
        if (confirm("Em có chắc chắn muốn xóa đi trang kỷ niệm này không? 🥺")) {
            diaries = diaries.filter(d => d.id !== selectedDiaryId);
            saveToDrive();
        }
    }
</script>

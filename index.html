<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#d4849c"/>
<title>💕 Nhật Ký Của Mình</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
/* ===================================================
   DESIGN TOKENS — ROSE SMOKE PALETTE
=================================================== */
:root{
  --p1:#a85470; --p2:#c97d96; --p3:#e8afc3; --p4:#f7dde8; --p5:#fef2f7;
  --glass:rgba(255,243,249,0.72); --glass-b:rgba(255,255,255,0.60);
  --sh:0 8px 32px rgba(168,84,112,0.13); --sh-sm:0 3px 12px rgba(168,84,112,0.09);
  --t1:#3d1f2d; --t2:#7a4a5e; --t3:#b08090; --rr:16px; --rrb:22px;
}

/* RESET & BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Quicksand',sans-serif; background:linear-gradient(145deg,#fce8f0 0%,#f4e0ef 50%,#ece0f5 100%);
  min-height:100vh; color:var(--t1); overflow-x:hidden;
}

/* SAKURA CANVAS */
#sakura-canvas{ position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5 }

/* LOCK SCREEN */
#lock-screen{
  position:fixed;inset:0;z-index:9000; display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#fce0ec,#f0d5f0,#dfd8f8); transition:opacity .5s;
}
#lock-screen.hiding{opacity:0;pointer-events:none}
.lock-card{
  background:rgba(255,248,253,.82); backdrop-filter:blur(28px); border-radius:28px;
  padding:38px 34px; text-align:center; box-shadow:0 24px 64px rgba(168,84,112,.22); width:90%; max-width:310px;
}
.pin-dots{display:flex;gap:11px;justify-content:center;margin-bottom:20px}
.pin-dot{ width:15px;height:15px;border-radius:50%; background:rgba(168,84,112,.14);border:2px solid var(--p3); transition:all .2s; }
.pin-dot.on{background:var(--p1);border-color:var(--p1);transform:scale(1.18)}
.pin-kb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pk{ background:rgba(255,255,255,.65);border:1.5px solid rgba(255,255,255,.75); border-radius:11px;padding:12px;font-weight:700; }

/* APP LAYOUT */
#app{display:none; position:relative;z-index:1; padding-bottom:80px}
.app-hdr{
  background:linear-gradient(135deg,rgba(168,84,112,.9),rgba(201,125,150,.82));
  backdrop-filter:blur(20px); position:sticky;top:0;z-index:200; color:#fff;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:13px 18px}
.clock-row{display:flex;gap:6px;justify-content:center;padding-bottom:10px}
.cu{background:rgba(255,255,255,.18);border-radius:9px;padding:4px 9px;min-width:56px;text-align:center}
.cn{font-size:1.15rem;font-weight:700}
.cl{font-size:.56rem;text-transform:uppercase}

.desk-tabs{ display:none; background:rgba(255,242,248,.68); backdrop-filter:blur(12px); position:sticky; z-index:150; padding:0 22px; }
@media(min-width:769px){ .desk-tabs{display:flex} }
.dtab{ padding:10px 18px; cursor:pointer; font-size:.83rem; font-weight:700; color:var(--t2); border-bottom:2.5px solid transparent; }
.dtab.on{ color:var(--p1); border-bottom-color:var(--p1) }

.main-layout{ display:grid; grid-template-columns:1fr; gap:16px; max-width:1200px; margin:0 auto; padding:16px; }
@media(min-width:769px){ .main-layout{grid-template-columns:1fr 1fr 1fr 1fr} .col-panel{display:block!important} }

/* GLASS CARD */
.gc{ background:var(--glass); backdrop-filter:blur(18px); border:1.5px solid var(--glass-b); border-radius:var(--rrb); box-shadow:var(--sh); margin-bottom:14px; overflow:hidden;}
.gc-hd{ padding:13px 17px; border-bottom:1px solid rgba(168,84,112,.09); display:flex; justify-content:space-between; align-items:center; }
.gc-ttl{ font-family:'Dancing Script',cursive; font-size:1.18rem; font-weight:700; color:var(--p1); }
.gc-body{ padding:13px 17px }

/* TIMELINE & ITEM */
.tl-wrap{display:flex;flex-direction:column;gap:9px}
.ti{ background:rgba(255,255,255,.55); border-radius:var(--rr); padding:11px 13px; cursor:pointer; position:relative; border-left:4px solid var(--p1); }
.ti-date{ font-size:.66rem; color:var(--t3); font-weight:600 }
.ti-ttl{ font-weight:700; font-size:.86rem; margin-bottom:2px }
.ti-pre{ font-size:.74rem; color:var(--t2); line-height:1.4; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }

/* CALENDAR */
.c-grid{padding:10px}
.c-wdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.6rem;font-weight:700;color:var(--t3);margin-bottom:5px}
.c-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cd{ aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; font-size:.76rem; cursor:pointer; position:relative; }
.cd.has-e{ background:rgba(168,84,112,.1); border:1px solid var(--p3); }
.cd.today{ background:var(--p1)!important; color:#fff!important; }
.cd-count{ position:absolute; top:1px; right:2px; font-size:0.55rem; background:var(--p1); color:#fff; border-radius:50%; width:12px; height:12px; display:flex; align-items:center; justify-content:center; }

/* ALBUM */
.album-day-group{margin-bottom:20px}
.album-day-hdr{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.album-time{font-size:0.7rem; color:var(--t3); font-weight:400}
.album-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:4px; border-radius:12px; overflow:hidden;}
.a-img{height:120px; background:#eee; position:relative}
.a-img img{width:100%; height:100%; object-fit:cover}

/* MODAL VIEW NAV */
.ve-nav{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; background:rgba(168,84,112,.05); padding:8px; border-radius:10px; }
.vn-btn{ background:var(--p1); color:#fff; border:none; padding:4px 12px; border-radius:6px; font-size:.7rem; cursor:pointer; font-weight:600}
.vn-btn:disabled{ background:var(--t3); opacity:0.5; cursor:not-allowed}
.vn-info{ font-size:.75rem; font-weight:700; color:var(--p1) }

/* FOOTER NAV MOBILE */
.mob-nav{ position:fixed;bottom:0;left:0;right:0;z-index:300; background:rgba(255,243,249,.94); display:flex; border-top:1px solid #eee; padding:8px 0 env(safe-area-inset-bottom); }
@media(min-width:769px){ .mob-nav{display:none} }
.mn-item{ flex:1; text-align:center; font-size:.6rem; color:var(--t3); }
.mn-item.on{ color:var(--p1) }

/* FAB */
#fab{ position:fixed; bottom:80px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--p1); color:#fff; border:none; font-size:1.5rem; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(0,0,0,0.2); z-index:400; }

/* GENERAL MODAL */
.modal{ position:fixed;inset:0; z-index:1000; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; padding:15px; }
.modal.open{display:flex}
.mbox{ background:#fff; width:100%; max-width:500px; border-radius:20px; padding:20px; max-height:90vh; overflow-y:auto; position:relative; }
.mc{ position:absolute; top:15px; right:15px; background:#eee; border:none; width:30px; height:30px; border-radius:50%; }

/* FORM ELEMENTS */
.fg{margin-bottom:12px}
.fl{display:block; font-size:.75rem; font-weight:700; margin-bottom:4px}
.fi, .fta{width:100%; padding:10px; border:1.2px solid #ddd; border-radius:8px; font-family:inherit;}
.fta{height:120px; resize:none}
.btn-p{ background:var(--p1); color:#fff; border:none; padding:12px; width:100%; border-radius:10px; font-weight:700; margin-top:10px; }

/* UTILS */
.hidden{display:none!important}
</style>
</head>
<body>

<canvas id="sakura-canvas"></canvas>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-card">
    <div style="font-family:'Dancing Script'; font-size:1.8rem; color:var(--p1); margin-bottom:10px">Nhật ký của mình~</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-kb">
      <button class="pk" onclick="kp('1')">1</button><button class="pk" onclick="kp('2')">2</button><button class="pk" onclick="kp('3')">3</button>
      <button class="pk" onclick="kp('4')">4</button><button class="pk" onclick="kp('5')">5</button><button class="pk" onclick="kp('6')">6</button>
      <button class="pk" onclick="kp('7')">7</button><button class="pk" onclick="kp('8')">8</button><button class="pk" onclick="kp('9')">9</button>
      <button class="pk" style="grid-column:2" onclick="kp('0')">0</button>
      <button class="pk" style="color:var(--p1)" onclick="kd()">⌫</button>
    </div>
    <div id="lock-err" style="color:red; font-size:.7rem; margin-top:10px"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-hdr" id="app-hdr">
    <div class="hdr-top">
      <div style="font-family:'Dancing Script'; font-size:1.4rem; font-weight:700">💕 Nhật Ký</div>
      <div onclick="syncData()" style="font-size:.75rem; cursor:pointer">🔄 Đồng bộ</div>
    </div>
    <div class="clock-row">
      <div class="cu"><div class="cn" id="ck-d">0</div><div class="cl">Ngày</div></div>
      <div class="cu"><div class="cn" id="ck-h">00</div><div class="cl">Giờ</div></div>
      <div class="cu"><div class="cn" id="ck-m">00</div><div class="cl">Phút</div></div>
      <div class="cu"><div class="cn" id="ck-s">00</div><div class="cl">Giây</div></div>
    </div>
  </header>

  <nav class="desk-tabs">
    <div class="dtab on" data-tab="diary" onclick="switchTab('diary')">📖 Nhật ký</div>
    <div class="dtab" data-tab="ann" onclick="switchTab('ann')">🌸 Kỷ niệm</div>
    <div class="dtab" data-tab="cal" onclick="switchTab('cal')">🗓 Lịch</div>
    <div class="dtab" data-tab="album" onclick="switchTab('album')">🖼 Album</div>
  </nav>

  <div class="main-layout">
    <!-- DIARY -->
    <div class="col-panel on" id="col-diary">
      <div id="otd-wrap"></div>
      <div class="gc">
        <div class="gc-hd"><div class="gc-ttl">📖 Nhật Ký</div></div>
        <div class="gc-body">
          <input type="text" class="fi" id="s-inp" placeholder="Tìm kiếm nhật ký..." oninput="renderTimeline()" style="margin-bottom:10px">
          <div class="tl-wrap" id="tl-wrap"></div>
        </div>
      </div>
    </div>

    <!-- ANNIVERSARY -->
    <div class="col-panel" id="col-ann">
      <div class="gc">
        <div class="gc-hd"><div class="gc-ttl">🌸 Kỷ Niệm</div></div>
        <div class="gc-body" id="ann-list"></div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="col-panel" id="col-cal">
      <div class="gc">
        <div class="gc-hd">
          <div class="gc-ttl">🗓 Lịch</div>
          <div style="font-size:.8rem; font-weight:700" id="c-mlbl"></div>
        </div>
        <div class="c-grid">
          <div class="c-wdays"><span>CN</span><span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span></div>
          <div class="c-days" id="c-days"></div>
        </div>
      </div>
    </div>

    <!-- ALBUM -->
    <div class="col-panel" id="col-album">
      <div class="gc">
        <div class="gc-hd"><div class="gc-ttl">🖼 Album Ảnh</div></div>
        <div class="gc-body" id="album-body"></div>
      </div>
    </div>
  </div>
</div>

<button id="fab" onclick="openWriteModal()">✍️</button>

<nav class="mob-nav">
  <div class="mn-item on" onclick="switchTab('diary')">📖<br>Nhật ký</div>
  <div class="mn-item" onclick="switchTab('ann')">🌸<br>Kỷ niệm</div>
  <div class="mn-item" onclick="switchTab('cal')">🗓<br>Lịch</div>
  <div class="mn-item" onclick="switchTab('album')">🖼<br>Album</div>
</nav>

<!-- MODAL: VIẾT -->
<div class="modal" id="modal-write">
  <div class="mbox">
    <button class="mc" onclick="closeModal('modal-write')">✕</button>
    <div style="font-family:'Dancing Script'; font-size:1.5rem; color:var(--p1); margin-bottom:15px">Viết nhật ký</div>
    <div class="fg"><label class="fl">Ngày viết</label><input type="date" class="fi" id="e-date"></div>
    <div class="fg"><label class="fl">Tiêu đề</label><input type="text" class="fi" id="e-ttl" placeholder="Hôm nay thế nào?"></div>
    <div class="fg"><label class="fl">Nội dung</label><textarea class="fta" id="e-cnt" placeholder="Kể mình nghe nhé..."></textarea></div>
    <div class="fg"><label class="fl">Ảnh (Tối đa 4)</label><input type="file" id="img-inp" accept="image/*" multiple onchange="onImgPick(this)"></div>
    <div id="img-prev" style="display:flex; gap:5px; margin-bottom:10px"></div>
    <button class="btn-p" onclick="saveEntry()">Lưu nhật ký 💾</button>
  </div>
</div>

<!-- MODAL: XEM -->
<div class="modal" id="modal-view">
  <div class="mbox">
    <button class="mc" onclick="closeModal('modal-view')">✕</button>
    
    <!-- Thanh điều hướng bài viết trong ngày -->
    <div id="ve-nav-box" class="ve-nav hidden">
      <button class="vn-btn" id="vn-prev" onclick="navEntry(-1)">◀ Bài trước</button>
      <div class="vn-info" id="vn-info">1 / 1</div>
      <button class="vn-btn" id="vn-next" onclick="navEntry(1)">Bài sau ▶</button>
    </div>

    <div id="ve-date" style="font-size:.7rem; color:var(--t3); font-weight:700"></div>
    <div id="ve-ttl" style="font-size:1.2rem; font-weight:700; color:var(--p1); margin:5px 0"></div>
    <div id="ve-cnt" style="font-size:.9rem; line-height:1.6; white-space:pre-wrap; margin-bottom:15px"></div>
    <div id="ve-imgs" style="display:grid; grid-template-columns:repeat(2,1fr); gap:5px"></div>
    
    <div style="display:flex; gap:10px; margin-top:20px">
      <button onclick="editEntry()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd">Sửa</button>
      <button onclick="delEntry()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ffcccc; color:red">Xóa</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:20px; font-size:.8rem; opacity:0; pointer-events:none; transition:0.3s; z-index:2000"></div>

<script>
/* CẤU HÌNH */
const CFG = {
  URL: 'https://script.google.com/macros/s/AKfycbwKcrU_ElfIOIimZ0SxWjDTRhLGMx5H1X1Vl2DMdio2ZGh04B8Ty3CYtDnm_oy-Yned/exec',
  PIN: '2204',
  LOVE: '2026-04-22'
};

let S = {
  data: { entries: [], anniversaries: [] },
  pin: '',
  curDateEntries: [], // Danh sách bài trong ngày đang xem
  curIdx: 0,          // Chỉ mục bài đang xem
  imgs: []
};

/* LOCK SCREEN LOGIC */
function kp(d) {
  if (S.pin.length < 4) S.pin += d;
  updDots();
  if (S.pin.length === 4) setTimeout(checkPin, 200);
}
function kd() { S.pin = S.pin.slice(0,-1); updDots(); }
function updDots() {
  for(let i=0; i<4; i++) document.getElementById('d'+i).classList.toggle('on', i<S.pin.length);
}
function checkPin() {
  if (S.pin === CFG.PIN) {
    document.getElementById('lock-screen').classList.add('hiding');
    setTimeout(() => {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      startClock();
      loadData();
    }, 500);
  } else {
    document.getElementById('lock-err').textContent = 'Sai mật mã rồi!';
    S.pin = ''; updDots();
  }
}

/* ĐỒNG HỒ TÌNH YÊU */
function startClock() {
  const start = new Date(CFG.LOVE + 'T00:00:00');
  setInterval(() => {
    const diff = Date.now() - start;
    // THAY ĐỔI 1: Bỏ hiển thị số 0 đằng trước ngày
    document.getElementById('ck-d').textContent = Math.floor(diff/86400000);
    document.getElementById('ck-h').textContent = String(Math.floor(diff/3600000)%24).padStart(2,'0');
    document.getElementById('ck-m').textContent = String(Math.floor(diff/60000)%60).padStart(2,'0');
    document.getElementById('ck-s').textContent = String(Math.floor(diff/1000)%60).padStart(2,'0');
  }, 1000);
}

/* DATA */
function loadData() {
  const fn = 'callback_' + Date.now();
  window[fn] = (res) => {
    S.data = res;
    // Sắp xếp: Ngày mới nhất -> Giờ đăng (updatedAt) mới nhất
    S.data.entries.sort((a,b) => {
        if(b.date !== a.date) return b.date.localeCompare(a.date);
        return (b.updatedAt || "").localeCompare(a.updatedAt || "");
    });
    renderAll();
    delete window[fn];
  };
  const script = document.createElement('script');
  script.src = CFG.URL + '?callback=' + fn;
  document.head.appendChild(script);
}

function postData(payload, msg) {
  toast('Đang xử lý...');
  fetch(CFG.URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(() => { toast(msg); loadData(); })
    .catch(() => toast('Lỗi kết nối!'));
}

function renderAll() {
  renderTimeline();
  renderCalendar();
  renderAlbum();
}

/* TIMELINE */
function renderTimeline() {
  const q = document.getElementById('s-inp').value.toLowerCase();
  const list = S.data.entries.filter(e => e.title.toLowerCase().includes(q) || e.content.toLowerCase().includes(q));
  document.getElementById('tl-wrap').innerHTML = list.map(e => `
    <div class="ti" onclick="openView('${e.id}')">
      <div class="ti-date">${fmtDateVN(e.date)}</div>
      <div class="ti-ttl">${e.title}</div>
      <div class="ti-pre">${e.content}</div>
    </div>
  `).join('');
}

/* LỊCH - THAY ĐỔI 2: Hỗ trợ nhiều bài 1 ngày */
function renderCalendar() {
  const now = new Date();
  document.getElementById('c-mlbl').textContent = `Tháng ${now.getMonth()+1} / ${now.getFullYear()}`;
  
  const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  
  // Gom nhóm entries theo ngày
  const eMap = {};
  S.data.entries.forEach(e => {
    if(!eMap[e.date]) eMap[e.date] = [];
    eMap[e.date].push(e);
  });

  let html = '';
  for(let i=0; i<first; i++) html += '<div></div>';
  for(let d=1; d<=days; d++) {
    const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasE = eMap[ds] || [];
    const isToday = (d === now.getDate());
    html += `
      <div class="cd ${isToday?'today':''} ${hasE.length?'has-e':''}" onclick="openViewByDate('${ds}')">
        ${d}
        ${hasE.length > 1 ? `<span class="cd-count">${hasE.length}</span>` : ''}
      </div>
    `;
  }
  document.getElementById('c-days').innerHTML = html;
}

/* XEM CHI TIẾT & NEXT BÀI */
function openView(id) {
  const entry = S.data.entries.find(e => e.id === id);
  if(!entry) return;
  // Tìm tất cả bài trong cùng ngày đó
  openViewByDate(entry.date, id);
}

function openViewByDate(date, focusId = null) {
  const entries = S.data.entries.filter(e => e.date === date);
  if(!entries.length) return;
  
  S.curDateEntries = entries;
  // Nếu có ID cụ thể thì mở bài đó, không thì mở bài mới nhất (đầu danh sách)
  S.curIdx = focusId ? entries.findIndex(e => e.id === focusId) : 0;
  if(S.curIdx === -1) S.curIdx = 0;

  updateViewModal();
  openModal('modal-view');
}

function updateViewModal() {
  const e = S.curDateEntries[S.curIdx];
  const navBox = document.getElementById('ve-nav-box');
  
  // Hiển thị thanh điều hướng nếu có nhiều bài
  if(S.curDateEntries.length > 1) {
    navBox.classList.remove('hidden');
    document.getElementById('vn-info').textContent = `${S.curIdx + 1} / ${S.curDateEntries.length}`;
    document.getElementById('vn-prev').disabled = (S.curIdx === 0);
    document.getElementById('vn-next').disabled = (S.curIdx === S.curDateEntries.length - 1);
  } else {
    navBox.classList.add('hidden');
  }

  document.getElementById('ve-date').textContent = fmtDateVN(e.date) + (e.updatedAt ? ' lúc ' + fmtTime(e.updatedAt) : '');
  document.getElementById('ve-ttl').textContent = e.title;
  document.getElementById('ve-cnt').textContent = e.content;
  document.getElementById('ve-imgs').innerHTML = (e.images || []).map(img => `<img src="${img.url || img}" style="width:100%; border-radius:8px">`).join('');
}

function navEntry(dir) {
  const newIdx = S.curIdx + dir;
  if(newIdx >= 0 && newIdx < S.curDateEntries.length) {
    S.curIdx = newIdx;
    updateViewModal();
  }
}

/* ALBUM - THAY ĐỔI 3: Thêm giờ, sắp xếp mới nhất lên đầu */
function renderAlbum() {
  const body = document.getElementById('album-body');
  // S.data.entries đã được sắp xếp ở loadData() nên ở đây chỉ cần render
  const entriesWithImg = S.data.entries.filter(e => e.images && e.images.length);
  
  if(!entriesWithImg.length) {
    body.innerHTML = '<div style="text-align:center; color:var(--t3); padding:20px">Chưa có ảnh nào~</div>';
    return;
  }

  body.innerHTML = entriesWithImg.map(e => `
    <div class="album-day-group">
      <div class="album-day-hdr">
        <div style="font-weight:700; font-size:.85rem; color:var(--p1)">${fmtDateVN(e.date)}</div>
        <div class="album-time">⏰ ${fmtTime(e.updatedAt)}</div>
      </div>
      <div class="album-grid">
        ${e.images.map(img => `<div class="a-img"><img src="${img.url || img}" onclick="openImg('${img.url || img}')"></div>`).join('')}
      </div>
    </div>
  `).join('');
}

/* VIẾT BÀI */
function openWriteModal() {
  S.curId = null; S.imgs = [];
  document.getElementById('e-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('e-ttl').value = '';
  document.getElementById('e-cnt').value = '';
  document.getElementById('img-prev').innerHTML = '';
  openModal('modal-write');
}

function onImgPick(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const b64 = e.target.result;
      S.imgs.push(b64);
      renderImgPrev();
    };
    reader.readAsDataURL(file);
  });
}

function renderImgPrev() {
  document.getElementById('img-prev').innerHTML = S.imgs.map((img, i) => `
    <div style="position:relative"><img src="${img}" style="width:50px; height:50px; object-fit:cover; border-radius:5px"></div>
  `).join('');
}

function saveEntry() {
  const entry = {
    id: S.curId || 'e_' + Date.now(),
    date: document.getElementById('e-date').value,
    title: document.getElementById('e-ttl').value || 'Không tiêu đề',
    content: document.getElementById('e-cnt').value,
    images: S.imgs,
    updatedAt: new Date().toISOString() // Lưu giờ đăng
  };
  postData({ action: 'save_entry', entry }, 'Đã lưu nhật ký!');
  closeModal('modal-write');
}

function delEntry() {
  if(!confirm('Xóa bài này nhé?')) return;
  const id = S.curDateEntries[S.curIdx].id;
  postData({ action: 'delete_entry', id }, 'Đã xóa!');
  closeModal('modal-view');
}

function editEntry() {
  const e = S.curDateEntries[S.curIdx];
  S.curId = e.id;
  S.imgs = e.images || [];
  document.getElementById('e-date').value = e.date;
  document.getElementById('e-ttl').value = e.title;
  document.getElementById('e-cnt').value = e.content;
  renderImgPrev();
  closeModal('modal-view');
  openModal('modal-write');
}

/* UTILS */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function switchTab(tab) {
  document.querySelectorAll('.col-panel').forEach(p => p.classList.remove('on'));
  document.getElementById('col-'+tab).classList.add('on');
  document.querySelectorAll('.mn-item, .dtab').forEach(i => {
    i.classList.toggle('on', i.innerText.toLowerCase().includes(tab) || (i.dataset && i.dataset.tab === tab));
  });
}
function fmtDateVN(ds) {
  if(!ds) return '';
  const p = ds.split('-');
  return `Ngày ${p[2]}/${p[1]}/${p[0]}`;
}
function fmtTime(iso) {
  if(!iso) return 'Vừa xong';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2000);
}
function syncData() { loadData(); toast('Đang đồng bộ...'); }

/* SAKURA */
(function() {
  const cv = document.getElementById('sakura-canvas');
  const ctx = cv.getContext('2d');
  let w, h, petals = [];
  function resize() { w = cv.width = window.innerWidth; h = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  class Petal {
    constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = Math.random()*2+1; this.v = Math.random()*1+0.5; }
    draw() {
      ctx.beginPath(); ctx.fillStyle = '#ffb7c5';
      ctx.ellipse(this.x, this.y, this.s*1.5, this.s, Math.PI/4, 0, Math.PI*2);
      ctx.fill(); this.y += this.v; this.x += Math.sin(this.y/20);
      if(this.y > h) { this.y = -10; this.x = Math.random()*w; }
    }
  }
  for(let i=0; i<30; i++) petals.push(new Petal());
  function ani() { ctx.clearRect(0,0,w,h); petals.forEach(p => p.draw()); requestAnimationFrame(ani); }
  ani();
})();
</script>
